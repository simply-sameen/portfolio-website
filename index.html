  <script>
    (function () {

      // ── Clock ──────────────────────────────────────────────────────────────
      function updateClock() {
        const time = new Date().toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', hour12: true,
          timeZone: 'Asia/Kolkata'
        });
        document.getElementById('clock').textContent = time.replace(':', '.') + ' IST';

      updateClock();
      setInterval(updateClock, 1000);

      function setHomeNav() {

          <li><a href="#" data-page="about">ABOUT</a></li>

          <li><a href="#" data-page="contact">CONTACT</a></li>`;

        navCentre.innerHTML = `

          <li><a href="#" data-page="about">ABOUT</a></li>
          <li><a href="#" data-page="posts">POSTS</a></li>

      function setAboutNav() {
        navCentre.innerHTML = `
          <li><a href="#" data-page="work">WORK</a></li>
          <li><a href="#" data-page="home">HOME</a></li>

      }

      function setContactNav() {
        navCentre.innerHTML = `
          <li><a href="#" data-page="work">WORK</a></li>
          <li><a href="#" data-page="about">ABOUT</a></li>
          <li><a href="#" data-page="posts">POSTS</a></li>
          <li><a href="#" data-page="home">HOME</a></li>`;
      }

      const navSetters = {
        home: setHomeNav, work: setWorkNav, about: setAboutNav,
        posts: setPostsNav, contact: setContactNav
      };

      // Event delegation — survives innerHTML swaps
      navCentre.addEventListener('click', e => {
        const link = e.target.closest('a[data-page]');
        if (!link) return;
        e.preventDefault();
        navigateTo(link.dataset.page);
      });

      // ── Work accordion ─────────────────────────────────────────────────────
      let workOpenSection = null;

      const WORK_DATA = {
        ideas: {
          label: 'Ideas',
          entries: [
            ['Upheld',    'Quick Complaints for the Little Guy',          'Pre Seed'],
            ['Future Me', 'Reality Check from a Study Abroad Counselor', 'Pre Seed'],
            ['Netfyo',    'Event Management OS',                          'Pre Seed'],
          ]
        },
        companies: {
          label: 'Companies',
          entries: [
            ['BillOPZ',   'GST Compliance Business Suite',           '2025'],
            ['CampusFlo', 'All Inclusive Campus Management Suite',   '2025'],
            ['Tenztro',   'Contract SaaS Dev &amp; Design',          '2025'],
            ['Grafyo',    'Creative Design House',                   '2024'],
          ]
        },
        brands: {
          label: 'Brands',
          entries: [
            ['WWW Bubbly',            'Luxury Indian Sarees',         '2026'],
            ['LegionFunding',         'Prop Trading Firm',            '2026'],
            ['TradeFXBook',           'Trade Journaling Platform',    '2026'],
            ['AICSSYC',               'National Student Congress',    '2025'],
            ['CSIS',                  'National Symposium',           '2025'],
            ['Hackethix',             'State Level Workshop',         '2025'],
            ['IEEE CS Kerala Chapter','40th Anniversary Rebrand',     '2025'],
            ['Velwet',                'Intimate Wellness Brand',      '2024'],
          ]
        }
      };

      function workEntriesHeight(n) {
        return n * 12 + (n - 1) * 20;
      }

      function renderWorkSection(key) {
        const { label, entries } = WORK_DATA[key];
        const h = workEntriesHeight(entries.length);
        const isOpen = workOpenSection === key;
        const extraClass = key === 'brands' ? ' work-entries-brands' : '';
        const entriesHtml = entries.map(([name, desc, year]) =>
          `<div class="work-entry">
            <div class="work-entry-left">
              <span class="entry-name">${name}</span>
              <span class="entry-desc">${desc}</span>
            </div>
            <span class="entry-year">${year}</span>
          </div>`
        ).join('');
        return `
          <a class="work-section-heading" href="#" onclick="toggleWorkSection('${key}'); return false;">${label}</a>
          <div class="work-entries${isOpen ? ' open' : ''}${extraClass}" style="max-height:${isOpen ? h : 0}px">
            ${entriesHtml}
          </div>`;
      }

      function toggleWorkSection(key) {
        if (currentPage !== 'work') return;
        workOpenSection = (workOpenSection === key) ? null : key;
        pageContent.innerHTML = PAGES.work();
      }

      window.toggleWorkSection = toggleWorkSection;

      // ── Page render functions ──────────────────────────────────────────────
      const PAGES = {
        home: () => `
          <div class="home-page">

          </div>`,

        work: () => `
          <div class="work-page">
            <div class="work-accordion">
              ${renderWorkSection('ideas')}
              ${renderWorkSection('companies')}

              <div class="about-row"><span class="about-key">Graduating</span><span class="about-val">Mid 2026</span></div>
              <div class="about-row"><span class="about-key">Awardee</span><span class="about-val">IEEE Rising Star 2025</span></div>
              <div class="about-row"><span class="about-key">Community</span><span class="about-val">Design Lead, IEEE CS SYP</span></div>
              <div class="about-row"><span class="about-key">Companies</span><span class="about-val">3 Founded before Graduation</span></div>
              <div class="about-row"><span class="about-key">Stage</span><span class="about-val">Pre Seed</span></div>
              <div class="about-row"><span class="about-key">Open to</span><span class="about-val">Seed Conversations · Select Brand Work</span></div>
            </div>
          </div>`,

        posts: () => `
          <div class="posts-page">
            <h2 class="posts-heading">Writing Some Posts</h2>
            <p class="posts-soon">Coming Soon</p>
          </div>`,

        contact: () => `
          <div class="contact-page">
            <h2 class="contact-heading">Contact</h2>
            <div class="contact-rows">
              <div class="about-row"><span class="about-key">Name</span><span class="about-val">Sameen Sardar S</span></div>
              <div class="about-row"><span class="about-key">Phone</span><span class="about-val"><a href="tel:+917511160055" style="color:inherit;text-decoration:none;">+91 75111 60055</a></span></div>
              <div class="about-row"><span class="about-key">Email</span><span class="about-val"><a href="mailto:sameensardar@gmail.com" style="color:inherit;text-decoration:none;">sameensardar@gmail.com</a></span></div>
            </div>
            <div class="contact-socials">
              <a href="https://www.linkedin.com/in/sameen-sardar" target="_blank" rel="noopener">LINKEDIN</a>
              <a href="https://x.com/sameensardars" target="_blank" rel="noopener">X</a>
              <a href="https://github.com/simply-sameen" target="_blank" rel="noopener">GITHUB</a>
            </div>
          </div>`,
      };

      // ── Router ─────────────────────────────────────────────────────────────
      const pageContent = document.getElementById('page-content');
      let currentPage   = null;
      let transitioning = false;

      function navigateTo(page) {
        if (!PAGES[page] || page === currentPage || transitioning) return;
        transitioning = true;

        pageContent.classList.add('fade-out');

        setTimeout(() => {
          navSetters[page]();
          pageContent.innerHTML = PAGES[page]();
          currentPage = page;

          pageContent.getBoundingClientRect(); // force reflow
          pageContent.classList.remove('fade-out');
          transitioning = false;
        }, 220);
      }

      // ── Initial render ─────────────────────────────────────────────────────
      navigateTo('home');

    })();
  </script>
</body>
</html>
